name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Format check
        run: |
          gofmt -w ./cmd ./internal
          git diff --exit-code

      - name: Test
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...

      - name: Secret scan
        run: sh scripts/secret-scan.sh

      - name: Smoke
        run: sh scripts/smoke.sh

      - name: Dogfood
        run: sh scripts/dogfood.sh

      - name: Race
        run: go test -race -shuffle=on -count=1 ./...

      - name: Build
        run: go build -trimpath -o bin/ceo-packet ./cmd/ceo-packet

      - name: Local production gate
        run: |
          sh scripts/release-local.sh
          sh scripts/production-local-gate.sh --workspace . --dist dist --output-dir .omo/evidence/ci-production-local-gate

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-production-local-gate-evidence
          path: .omo/evidence/ci-production-local-gate/**
